<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Chamber 3</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url("background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    .title {
      position: fixed;
      top: 18px;
      left: 24px;
      z-index: 50;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 0 8px black, 0 0 14px black;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    /* dog button */
    .dog-button {
      position: fixed;
      bottom: 30%;
      left: 35%;
      width: 150px;
      height: auto;
      cursor: pointer;
      z-index: 20;
      transition: transform 0.15s ease;
    }

    .dog-button:hover {
      transform: scale(1.06);
    }

     #loadingScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 99999;
  cursor: pointer;
  transition: opacity 1s ease;
}

#loadingScreen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

    .invisible-zone {
      position: fixed;
      top: 30%;
      left: 20%;
      width: 200vh;
      height: 400vh;
      cursor: pointer;
      background: transparent;
      border: none;
      z-index: 30;
    }

      .answer-box {
      text-align: center;
      text-shadow: 0 2px 4px black;
    }

    .answer-box label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 18px;
    }

    .answer-box input {
      padding: 6px;
      font-size: 15px;
      width: 175px;
    }

    .answer-box button {
      padding: 6px 10px;
      font-size: 15px;
      cursor: pointer;
    }

    #room-radio {
  position: fixed;
  bottom: 12vh;
  left: 12vw;
  width: 180px;
  cursor: pointer;
}

#radio-popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 420px;
  padding: 35px 25px 30px;
  background-color: #8fcf8f;
  border: 8px solid #245c38;
  border-radius: 18px;

  box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
  text-align: center;
  z-index: 50;
}

#radio-close {
  position: absolute;
  top: 8px;
  right: 10px;

  background-color: #245c38;
  color: white;
  border: none;
  font-size: 18px;
  padding: 4px 10px;
  cursor: pointer;
}

#frequency-display {
  background-color: #102b1a;
  color: #9cff9c;
  border: 3px solid #245c38;
  border-radius: 8px;

  font-size: 42px;
  font-family: monospace;
  padding: 18px;
  margin-bottom: 28px;

  text-shadow: 0 0 8px #9cff9c;
}

#radio-controls button {
  background-color: #245c38;
  color: white;
  border: 3px solid #102b1a;
  border-radius: 8px;

  font-size: 28px;
  padding: 10px 22px;
  margin: 0 8px;
  cursor: pointer;
}

#radio-controls button:hover,
#radio-close:hover {
  background-color: #163b25;
}
    
  </style>
</head>

  <body>
    
    <div id="loadingScreen" onclick="closeLoadingScreen()">
  <img src="loading.jpg" alt="Loading Screen">
</div>

 <!-- GLaDOS  -->
    <img id="gladosButton" src="glados.png" alt="GLaDOS Button" class="glados-button">
    <audio id="gladosAudio" src="glados.mp3"></audio>

     <!-- Invisible man -->
      <button id="invisibleZone" class="invisible-zone" aria-label="Man button"></button>
    <audio id="manAudio" src="man.mp3"></audio>

     <!-- doggo button-->
<img
  id="dog-button"
  src="dog1.jpg"
  alt="Dog Button"
  class="dog-button"
  onclick="toggleDog()"
/>

<audio id="dog-audio" src="dog.mp3"></audio>

     <!-- wrong answer audio -->
  <audio id="wrong1Audio" src="wrong1.mp3"></audio>
  <audio id="wrong2Audio" src="wrong2.mp3"></audio>

     <!-- radio  -->
<img id="room-radio" src="radio.jpg" onclick="openRadio()" alt="Radio">

<!-- Radio popup -->
<div id="radio-popup">
  <button id="radio-close" onclick="closeRadio()">X</button>

  <div id="frequency-display">87.5 FM</div>

  <div id="radio-controls">
    <button onclick="previousStation()">&lt;</button>
    <button onclick="togglePlay()" id="play-button">PLAY</button>
    <button onclick="nextStation()">&gt;</button>
  </div>
</div>

<audio id="radio-audio"></audio>
    
  <audio id="radio-audio1" src="1hlstatic.mp3"></audio>
  <audio id="radio-audio2" src="2birbs.mp3"></audio>
  <audio id="radio-audio3" src="3glados.mp3"></audio>
  <audio id="radio-audio4" src="4cowboy.mp3"></audio>
  <audio id="radio-audio5" src="5static.mp3"></audio>
  <audio id="radio-audio6" src="6gman.mp3"></audio>

<audio id="wrong1Audio" src="wrong1.mp3"></audio>
<audio id="wrong2Audio" src="wrong2.mp3"></audio>
<audio id="wrong3Audio" src="wrong3.mp3"></audio>
<audio id="wrong4Audio" src="wrong4.mp3"></audio>

    <div class="answer-box">
  <label for="answer">Enter code:</label>
  <input id="answer" type="text">
  <button onclick="checkAnswer()">Submit</button>
</div>
    
    <script>
  // Loading screen
  function closeLoadingScreen() {
    const loadingScreen = document.getElementById("loadingScreen");
    loadingScreen.style.opacity = "0";

    setTimeout(() => {
      loadingScreen.style.display = "none";
    }, 1000);
  }

  // GLaDOS intro
  const gladosButton = document.getElementById("gladosButton");
  const gladosAudio = document.getElementById("gladosAudio");

  gladosButton.addEventListener("click", () => {
    gladosAudio.currentTime = 0;
    gladosAudio.play();
  });

  // Invisible man
  const invisibleZone = document.getElementById("invisibleZone");
  const manAudio = document.getElementById("manAudio");

  invisibleZone.addEventListener("click", () => {
    manAudio.currentTime = 0;
    manAudio.play();
  });

  // Dog toggle
  let isDog2 = false;

  function toggleDog() {
    const img = document.getElementById("dog-button");
    const audio = document.getElementById("dog-audio");

    img.src = isDog2 ? "dog1.jpg" : "dog2.jpg";
    isDog2 = !isDog2;

    audio.currentTime = 0;
    audio.play();
  }

  // Radio
  const stations = [
    { frequency: "87.5 FM", audio: "1hlstatic.mp3" },
    { frequency: "89.5 FM", audio: "2birbs.mp3" },
    { frequency: "92.2 FM", audio: "3glados.mp3" },
    { frequency: "95.7 FM", audio: "4cowboy.mp3" },
    { frequency: "98.3 FM", audio: "5static.mp3" },
    { frequency: "99.4 FM", audio: "6gman.mp3" }
  ];

  let currentStation = 0;
  let isPlaying = false;

  const popup = document.getElementById("radio-popup");
  const frequencyDisplay = document.getElementById("frequency-display");
  const radioAudio = document.getElementById("radio-audio");
  const playButton = document.getElementById("play-button");

  function openRadio() {
    popup.style.display = "block";
    updateStation();
  }

  function closeRadio() {
    popup.style.display = "none";
    radioAudio.pause();
    radioAudio.currentTime = 0;
    isPlaying = false;
    playButton.textContent = "PLAY";
  }

  function updateStation() {
    frequencyDisplay.textContent = stations[currentStation].frequency;
    radioAudio.src = stations[currentStation].audio;

    radioAudio.pause();
    radioAudio.currentTime = 0;
    isPlaying = false;
    playButton.textContent = "PLAY";
  }

  function previousStation() {
    currentStation--;

    if (currentStation < 0) {
      currentStation = stations.length - 1;
    }

    updateStation();
  }

  function nextStation() {
    currentStation++;

    if (currentStation >= stations.length) {
      currentStation = 0;
    }

    updateStation();
  }

  function togglePlay() {
    if (isPlaying) {
      radioAudio.pause();
      isPlaying = false;
      playButton.textContent = "PLAY";
    } else {
      radioAudio.currentTime = 0;
      radioAudio.play();
      isPlaying = true;
      playButton.textContent = "STOP";
    }
  }

  // Answer checking
  let wrongAttempt = 0;

  function checkAnswer() {
    const userInput = document.getElementById("answer").value.trim();

    if (userInput === "9228694") {
      window.location.href = "https://ohlooklizard.github.io/outside/";
    } else {
      wrongAttempt++;

      let audioToPlay;

      if (wrongAttempt === 1) {
        audioToPlay = document.getElementById("wrong1Audio");
      } else if (wrongAttempt === 2) {
        audioToPlay = document.getElementById("wrong2Audio");
      } else if (wrongAttempt === 3) {
        audioToPlay = document.getElementById("wrong3Audio");
      } else {
        audioToPlay = document.getElementById("wrong4Audio");
      }

      audioToPlay.currentTime = 0;
      audioToPlay.play();
    }
  }
</script>
</body>
</html>
