<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Chamber 3</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url("background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    .title {
      position: fixed;
      top: 18px;
      left: 24px;
      z-index: 50;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 0 8px black, 0 0 14px black;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    /* dog button */
    .dog-button {
      position: fixed;
      bottom: 30%;
      left: 35%;
      width: 150px;
      height: auto;
      cursor: pointer;
      z-index: 20;
      transition: transform 0.15s ease;
    }

    .dog-button:hover {
      transform: scale(1.06);
    }

     #loadingScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 99999;
  cursor: pointer;
  transition: opacity 1s ease;
}

#loadingScreen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

    .invisible-zone {
      position: fixed;
      top: 30%;
      left: 20%;
      width: 200vh;
      height: 400vh;
      cursor: pointer;
      background: transparent;
      border: none;
      z-index: 30;
    }

    
  </style>
</head>

  <body>

    alt="Dog Button"

  />

     <button

  ></button>
